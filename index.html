<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>트렌드 탐색기</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    /* ── 리셋 & 기반 ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0920;
      --surface:   #160d2e;
      --border:    #2d1f4d;
      --accent:    #7C6AFA;
      --accent2:   #c4b5fd;
      --text:      #e8e0ff;
      --muted:     #9580c8;
      --danger:    #FA6A7C;
      --radius:    14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
      min-height: 100vh;
      padding: 0 16px 60px;
    }

    /* ── 헤더 ── */
    header {
      max-width: 780px;
      margin: 0 auto;
      padding: 52px 0 36px;
      text-align: center;
    }

    header .eyebrow {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 14px;
    }

    header h1 {
      font-size: clamp(28px, 5vw, 44px);
      font-weight: 700;
      line-height: 1.15;
      background: linear-gradient(135deg, #fff 0%, var(--accent2) 60%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
    }

    header p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    /* ── 카드 ── */
    .card {
      max-width: 780px;
      margin: 0 auto 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
    }

    /* ── 탭 ── */
    .tab-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .tab-btn {
      flex: 1;
      padding: 10px 0;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.18s;
    }

    .tab-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .tab-btn:not(.active):hover {
      border-color: var(--accent2);
      color: var(--accent2);
    }

    /* ── 입력 행 ── */
    .input-row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    input[type="text"],
    input[type="date"] {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus,
    input[type="date"]:focus {
      border-color: var(--accent);
    }

    input[type="text"]::placeholder { color: var(--muted); }

    #keywordInput { flex: 1; min-width: 160px; }

    /* 날짜 인풋 다크 캘린더 */
    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(0.6);
      cursor: pointer;
    }

    /* ── 날짜 행 ── */
    .date-row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .date-row label {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    .date-row span { color: var(--border); font-size: 14px; }

    /* ── 추가 키워드 ── */
    #extraKeywords {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .keyword-extra {
      flex: 1;
      min-width: 120px;
    }

    /* ── 버튼 ── */
    .btn-primary {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 22px;
      transition: opacity 0.15s;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      padding: 10px 14px;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .btn-ghost:hover {
      border-color: var(--accent2);
      color: var(--accent2);
    }

    /* ── 스피너 ── */
    #spinner {
      display: none;
      justify-content: center;
      align-items: center;
      gap: 10px;
      padding: 32px 0;
      color: var(--muted);
      font-size: 13px;
    }

    .spinner-ring {
      width: 24px; height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 에러 ── */
    #errorMsg {
      display: none;
      background: #2a0f1a;
      border: 1px solid var(--danger);
      border-radius: 8px;
      color: var(--danger);
      font-size: 13px;
      margin-top: 16px;
      padding: 12px 16px;
    }

    /* ── 차트 ── */
    #chartWrap {
      display: none;
      max-width: 780px;
      margin: 0 auto 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
    }

    #chartWrap h2 {
      font-size: 15px;
      font-weight: 600;
      color: var(--accent2);
      margin-bottom: 20px;
    }

    .chart-container {
      position: relative;
      height: 320px;
    }

    /* ── 테이블 ── */
    #tableWrap {
      display: none;
      max-width: 780px;
      margin: 0 auto 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead {
      background: #1f1040;
    }

    th {
      color: var(--accent2);
      font-weight: 600;
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 10px 16px;
      color: var(--text);
      border-bottom: 1px solid var(--border);
    }

    tr:last-child td { border-bottom: none; }

    tr:hover td { background: #1a0d38; }

    /* ── 설명 배지 ── */
    .info-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .badge {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .badge strong { color: var(--accent2); }

    .tab-desc {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 0;
    }

    .cat-select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      cursor: pointer;
      transition: border-color 0.15s;
      min-width: 180px;
    }

    .cat-select:focus { border-color: var(--accent); }
    .cat-select option { background: #160d2e; }

    /* 단위 토글 */
    .unit-toggle {
      display: flex;
      gap: 4px;
      margin-left: 4px;
    }

    .unit-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      padding: 5px 10px;
      transition: all 0.15s;
    }

    .unit-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .unit-btn:not(.active):hover {
      border-color: var(--accent2);
      color: var(--accent2);
    }

    .data-lag-note {
      font-size: 11px;
      color: var(--muted);
      margin-top: 8px;
      padding-left: 2px;
    }
  </style>
</head>
<body>

  <!-- 헤더 -->
  <header>
    <p class="eyebrow">Naver DataLab</p>
    <h1>트렌드 탐색기</h1>
    <p>검색어 트렌드와 쇼핑 인사이트로<br>어떤 키워드가 뜨고 있는지 확인하세요</p>
  </header>

  <!-- 검색 카드 -->
  <div class="card">
    <div class="tab-row">
      <button class="tab-btn active" data-mode="trend">📈 검색어 트렌드</button>
      <button class="tab-btn" data-mode="shopping">🛍️ 쇼핑 인사이트</button>
    </div>

    <!-- 트렌드 전용 안내 -->
    <div id="trendArea">
      <p class="tab-desc">네이버 전체 검색 기준 · 최대 5개 키워드 비교</p>
    </div>

    <!-- 쇼핑 전용 안내 + 카테고리 선택 -->
    <div id="shoppingArea" style="display:none">
      <p class="tab-desc">네이버 쇼핑 클릭 기준 · 카테고리를 먼저 선택하세요</p>
      <div class="date-row" style="margin-top:12px">
        <label>카테고리</label>
        <select id="categorySelect" class="cat-select">
          <option value="">-- 카테고리 선택 --</option>
        </select>
      </div>
    </div>

    <div class="input-row" style="margin-top:14px">
      <input type="text" id="keywordInput" placeholder="키워드 입력 (예: 맥캘란)" />
      <button class="btn-ghost" id="addKeywordBtn">+ 비교 키워드</button>
      <button class="btn-primary" id="searchBtn">검색</button>
    </div>

    <div id="extraKeywords"></div>

    <div class="date-row">
      <label>기간</label>
      <input type="date" id="startDate" />
      <span>~</span>
      <input type="date" id="endDate" />
      <div class="unit-toggle">
        <button class="unit-btn active" data-unit="date">일별</button>
        <button class="unit-btn" data-unit="week">주별</button>
        <button class="unit-btn" data-unit="month">월별</button>
      </div>
    </div>
    <p class="data-lag-note" id="lagNote">💡 일별: 약 2~3일 전 데이터까지 제공됩니다</p>

    <div id="errorMsg"></div>
  </div>

  <!-- 로딩 -->
  <div id="spinner">
    <div class="spinner-ring"></div>
    데이터 불러오는 중…
  </div>

  <!-- 차트 -->
  <div id="chartWrap">
    <h2>검색량 추이</h2>
    <div class="chart-container">
      <canvas id="resultChart"></canvas>
    </div>
  </div>

  <!-- 테이블 -->
  <div id="tableWrap"></div>

  <script src="search.js"></script>
</body>
</html>
